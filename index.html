<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio Dayellenn Fernanda</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fdfdfd;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #6a0dad;
      color: white;
      text-align: center;
      padding: 2rem 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }
    .card {
      background-color: white;
      border: 2px solid #6a0dad;
      border-radius: 10px;
      padding: 1rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card h2 {
      color: #6a0dad;
      margin-bottom: 1rem;
      text-align: center;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      margin: 0.5rem 0;
    }
    ul li a {
      text-decoration: none;
      color: #6a0dad;
      font-weight: bold;
      transition: color 0.2s ease;
    }
    ul li a:hover {
      color: #4b0082;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background-color: #6a0dad;
      color: white;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Portfólio Dayellenn Fernanda</h1>
    <p>Visualize minhas tarefas por categoria</p>
  </header>

  <main class="container">
    <div class="card">
      <h2>JavaScript</h2>
      <ul>
        <li><a href="https://github.com/dayday-13/terceirao2026.git" target="_blank"> JavaScript</a></li>
  
      </ul>
    </div>
    
  </main>

  <footer>
    <p>&copy; 2026 Dayellenn Fernanda - Portfólio</p>
  </footer>
</body>
</html>
