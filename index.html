<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portifolio Enzo 2026 🌸</title>
  <style>
    body {
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      background-color: #ffeef8; /* rosa bebê */
      color: #4d004d; /* roxo suave para contraste */
    }

    header {
      background: linear-gradient(90deg, #ffb6c1, #ff69b4); /* rosa bebê + rosa forte */
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #ff69b4;
    }

    header h1 {
      color: #fff;
      font-size: 24px;
      text-shadow: 2px 2px #ffb6c1;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #ffb6c1;
      padding: 10px;
    }

    nav a {
      color: #4d004d;
      text-decoration: none;
      margin: 0 15px;
      font-size: 14px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
      text-shadow: 0 0 5px #ff69b4;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: #fff0f5; /* rosa bebê mais claro */
      border: 2px solid #ff69b4;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff69b4;
    }

    .card a {
      color: #ff1493; /* rosa choque para destaque */
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      background-color: #ffb6c1;
      color: #4d004d;
      text-align: center;
      padding: 10px;
      border-top: 3px solid #ff69b4;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌸 Portifolio Dayellenn 2026 🌸</h1>
  </header>

  <nav>
    <a href="#javascript">JavaScript</a>
    <a href="#html">HTML</a>
    <a href="#mobile">Programação Mobile</a>
    <a href="#sobre">Sobre</a>
    <a href="#contato">Contato</a>
  </nav>

  <!-- Conteúdo igual ao seu original -->
  <section id="https://github.com/dayday-13/terceirao2026.git" class="container">
    <div class="card">
      <h2>Tarefa JS 1</h2>
      <p>Primeiro Codigos</p>
      <a href="" target="_blank">Ver Tarefa</a>
    </div>

    </div>
  </section>

  <!-- Outras seções iguais ao original -->

  <footer>
    <p>© 2026 Portifolio Day - Todos os direitos reservados</p>
  </footer>
</body>
</html>
